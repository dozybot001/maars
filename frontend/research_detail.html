<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research · Detail</title>
    <script>
        (function() {
            document.documentElement.setAttribute('data-theme', 'black');
        })();
    </script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
    <button
        id="appSidebarToggle"
        class="app-sidebar-toggle"
        type="button"
        aria-label="Toggle sidebar"
        aria-controls="appSidebar"
        aria-expanded="false"
    >
        <span class="app-sidebar-toggle-icon" aria-hidden="true"></span>
    </button>
    <aside id="appSidebar" class="app-sidebar" aria-hidden="true">
        <div id="appSidebarContent" class="app-sidebar-content" hidden></div>
    </aside>

    <div class="container">
        <div id="settingsModalSlot"></div>

        <main class="main-content">
            <section id="researchView" class="research-view">
                <div class="research-topbar">
                    <div class="research-breadcrumb" id="researchBreadcrumb">Research</div>
                    <h2 class="research-title" id="researchTitle">Research</h2>
                    <div class="research-stage-row">
                        <nav class="research-stage-progress" aria-label="Research pipeline stages">
                            <div class="research-stage-item" data-stage-item="refine">
                                <button type="button" class="research-stage-btn" id="stageBtnRefine" data-stage="refine" aria-disabled="true" disabled>Refine</button>
                                <div class="research-stage-meta" id="stageMetaRefine">idle</div>
                                <div class="research-stage-actions">
                                    <button type="button" class="research-stage-action-btn" id="stageRunRefine">Run</button>
                                    <button type="button" class="research-stage-action-btn" id="stageResumeRefine">Resume</button>
                                    <button type="button" class="research-stage-action-btn" id="stageRetryRefine">Retry</button>
                                    <button type="button" class="research-stage-action-btn is-danger" id="stageStopRefine">Stop</button>
                                </div>
                            </div>
                            <div class="research-stage-item" data-stage-item="plan">
                                <button type="button" class="research-stage-btn" id="stageBtnPlan" data-stage="plan" aria-disabled="true" disabled>Plan</button>
                                <div class="research-stage-meta" id="stageMetaPlan">idle</div>
                                <div class="research-stage-actions">
                                    <button type="button" class="research-stage-action-btn" id="stageRunPlan">Run</button>
                                    <button type="button" class="research-stage-action-btn" id="stageResumePlan">Resume</button>
                                    <button type="button" class="research-stage-action-btn" id="stageRetryPlan">Retry</button>
                                    <button type="button" class="research-stage-action-btn is-danger" id="stageStopPlan">Stop</button>
                                </div>
                            </div>
                            <div class="research-stage-item" data-stage-item="execute">
                                <button type="button" class="research-stage-btn" id="stageBtnExecute" data-stage="execute" aria-disabled="true" disabled>Execute</button>
                                <div class="research-stage-meta" id="stageMetaExecute">idle</div>
                                <div class="research-stage-actions">
                                    <button type="button" class="research-stage-action-btn" id="stageRunExecute">Run</button>
                                    <button type="button" class="research-stage-action-btn" id="stageResumeExecute">Resume</button>
                                    <button type="button" class="research-stage-action-btn" id="stageRetryExecute">Retry</button>
                                    <button type="button" class="research-stage-action-btn is-danger" id="stageStopExecute">Stop</button>
                                </div>
                            </div>
                            <div class="research-stage-item" data-stage-item="paper">
                                <button type="button" class="research-stage-btn" id="stageBtnPaper" data-stage="paper" aria-disabled="true" disabled>Paper</button>
                                <div class="research-stage-meta" id="stageMetaPaper">idle</div>
                                <div class="research-stage-actions">
                                    <button type="button" class="research-stage-action-btn" id="stageRunPaper">Run</button>
                                    <button type="button" class="research-stage-action-btn" id="stageResumePaper">Resume</button>
                                    <button type="button" class="research-stage-action-btn" id="stageRetryPaper">Retry</button>
                                    <button type="button" class="research-stage-action-btn is-danger" id="stageStopPaper">Stop</button>
                                </div>
                            </div>
                        </nav>
                    </div>
                </div>

                <div class="research-stage-panel" id="researchPanelRefine" data-stage-panel="refine" aria-label="Refine stage">
                    <div class="research-stage-panel-inner">
                        <div class="research-stage-card">
                            <div class="research-stage-card-header">Refine Result</div>
                            <div class="research-stage-card-body markdown-body" id="researchRefineLogic">—</div>
                        </div>
                        <details class="research-appendix" id="researchRefineAppendix">
                            <summary class="research-appendix-summary">Appendix · References</summary>
                            <div class="research-appendix-body markdown-body" id="researchRefineReferences">—</div>
                        </details>
                    </div>
                </div>

                <div class="plan-agent-thinking-tree-row research-stage-panel" id="researchDetailHost" data-stage-panel="workbench" aria-label="Plan and Execute workbench">
                    <div class="plan-agent-tree-area" data-tree-area="plan">
                        <div class="tree-view-tabs">
                            <button type="button" class="tree-view-tab active" data-view="decomposition" aria-pressed="true">Decomposition</button>
                            <button type="button" class="tree-view-tab" data-view="execution" aria-pressed="false">Execution</button>
                            <button type="button" class="tree-view-tab" data-view="output" aria-pressed="false">Output</button>
                        </div>
                        <div class="tree-view-panel view-decomposition active" data-view-panel="decomposition">
                            <div class="plan-agent-quality-badge" id="planAgentQualityBadge" title="" hidden></div>
                            <div class="tree-container">
                                <div class="tasks-tree plan-agent-tasks-tree"></div>
                            </div>
                        </div>
                        <div class="tree-view-panel view-execution" data-view-panel="execution">
                            <div class="plan-agent-execution-tree-area" data-tree-area="execution">
                                <div class="research-execution-runtime" id="researchExecutionRuntime">
                                    <span class="research-execution-runtime-badge" id="researchExecutionRuntimeBadge">Docker: checking…</span>
                                    <span class="research-execution-runtime-meta" id="researchExecutionRuntimeMeta"></span>
                                </div>
                                <div class="tree-container">
                                    <div class="tasks-tree plan-agent-execution-tree"></div>
                                </div>
                            </div>
                        </div>
                        <div class="tree-view-panel view-output" data-view-panel="output">
                            <div class="task-agent-output-area plan-agent-output-area" id="taskAgentOutputArea">
                                <div class="task-agent-output-content markdown-body" id="taskAgentOutputContent"></div>
                            </div>
                        </div>
                    </div>
                    <div class="research-execute-splitter" id="researchExecuteSplitter" role="separator" aria-orientation="vertical" aria-label="Resize execution layout"></div>
                    <div class="plan-agent-thinking-area" id="planAgentThinkingArea">
                        <div class="plan-agent-thinking-content markdown-body" id="planAgentThinkingContent"></div>
                        <div class="plan-agent-thinking-placeholder" id="planAgentThinkingPlaceholder">Thinking shows reasoning; Output shows final artifacts.</div>

                        <div class="research-execute-stream" id="researchExecuteStream" hidden>
                            <div class="research-execute-stream-header">
                                <span>Execution Stream</span>
                                <div class="research-execute-stream-actions">
                                    <button type="button" class="research-execute-stream-jump-latest" id="researchExecuteJumpLatestBtn" hidden>Jump to latest</button>
                                    <button type="button" class="research-execute-stream-toggle-all" id="researchExecuteToggleAllBtn">Collapse All</button>
                                </div>
                            </div>
                            <div class="research-execute-stream-body" id="researchExecuteStreamBody">—</div>
                        </div>
                    </div>
                </div>

                <div class="research-stage-panel" id="researchPanelPaper" data-stage-panel="paper" aria-label="Paper stage">
                    <div class="research-stage-panel-inner">
                        <div class="research-stage-card research-stage-card--fill">
                            <div class="research-stage-card-header">Paper</div>
                            <div class="research-stage-card-body markdown-body" id="researchPaperBody">—</div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="taskAgentOutputModal" class="task-agent-output-modal" aria-hidden="true">
        <div class="task-agent-output-modal-backdrop"></div>
        <div class="task-agent-output-modal-dialog">
            <div class="task-agent-output-modal-header">
                <span class="task-agent-output-modal-title" id="taskAgentOutputModalTitle">Task Output</span>
                <span class="task-agent-output-modal-actions">
                    <button type="button" class="task-agent-output-modal-download" id="taskAgentOutputModalDownload" aria-label="Download" title="Download"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v16"/><path d="M7 15l5 5 5-5"/></svg></button>
                    <button type="button" class="task-agent-output-modal-close" id="taskAgentOutputModalClose" aria-label="Close">×</button>
                </span>
            </div>
            <div class="task-agent-output-modal-body markdown-body" id="taskAgentOutputModalBody"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="js/core/utils.js"></script>
    <script src="js/ui/toast.js"></script>
    <script src="js/core/config.js"></script>
    <script src="js/core/logger.js"></script>
    <script src="js/core/state.js"></script>
    <script src="js/regions/tree/task-tree-popover.js"></script>
    <script src="js/regions/tree/task-tree-zoom.js"></script>
    <script src="js/regions/tree/task-tree-events.js"></script>
    <script src="js/regions/tree/task-tree-renderer.js"></script>
    <script src="js/regions/tree/task-tree.js"></script>
    <script src="js/ui/theme.js"></script>
    <script src="js/api/research-api.js"></script>
    <script src="js/api/api.js"></script>
    <script src="js/flows/task-run-controls.js"></script>
    <script src="js/flows/task-execution-state.js"></script>
    <script src="js/flows/task.js"></script>
    <script src="js/flows/research-execute-utils.js"></script>
    <script src="js/flows/research-execution-graph.js"></script>
    <script src="js/flows/research-nav-utils.js"></script>
    <script src="js/flows/research-core-utils.js"></script>
    <script src="js/flows/research-execute-render.js"></script>
    <script src="js/flows/research-execute-state.js"></script>
    <script src="js/flows/research-loader.js"></script>
    <script src="js/flows/research-event-bridges.js"></script>
    <script src="js/flows/research-stage-ui.js"></script>
    <script src="js/flows/research.js"></script>
    <script src="js/regions/output-utils.js"></script>
    <script src="js/regions/output.js"></script>
    <script src="js/regions/thinking-stream.js"></script>
    <script src="js/regions/thinking.js"></script>
    <script src="js/ws/handlers/thinking-handler.js"></script>
    <script src="js/ws/websocket.js"></script>
    <script src="js/ui/settings-presets.js"></script>
    <script src="js/ui/settings-sync.js"></script>
    <script src="js/ui/settings.js"></script>
    <script src="js/ui/sidebar.js"></script>
    <script src="app.js"></script>
</body>
</html>
