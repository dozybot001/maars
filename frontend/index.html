<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAARS - Multi-Agent Automated Research System</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <header>
    <h1>MAARS</h1>
    <p class="subtitle">Multi-Agent Automated Research System</p>
  </header>

  <main>
    <section id="input-area">
      <div class="input-wrapper">
        <input
          type="text"
          id="research-input"
          placeholder="Enter your research idea and press Enter..."
          autocomplete="off"
        >
        <button id="start-btn">Start</button>
      </div>
    </section>

    <section id="pipeline-cards">
      <div class="stage-card" data-stage="refine">
        <div class="card-header">
          <h3>Refine</h3>
          <span class="stage-badge" data-status="idle">idle</span>
        </div>
        <p class="card-desc">Clarify and refine the research idea</p>
        <div class="stage-controls">
          <button data-action="stop" title="Stop" disabled>&#9724;</button>
          <button data-action="retry" title="Retry" disabled>&#8634;</button>
        </div>
      </div>

      <div class="stage-card" data-stage="research">
        <div class="card-header">
          <h3>Research</h3>
          <span class="stage-badge" data-status="idle">idle</span>
        </div>
        <p class="card-desc">Decompose, execute, and evaluate</p>
        <div class="stage-controls">
          <button data-action="stop" title="Stop" disabled>&#9724;</button>
          <button data-action="resume" title="Resume" disabled>&#9654;&#9654;</button>
          <button data-action="retry" title="Retry" disabled>&#8634;</button>
        </div>
      </div>

      <div class="stage-card" data-stage="write">
        <div class="card-header">
          <h3>Write</h3>
          <span class="stage-badge" data-status="idle">idle</span>
        </div>
        <p class="card-desc">Write the research paper</p>
        <div class="stage-controls">
          <button data-action="stop" title="Stop" disabled>&#9724;</button>
          <button data-action="retry" title="Retry" disabled>&#8634;</button>
        </div>
      </div>
    </section>

    <section id="workspace">
      <!-- Left: Reasoning Log -->
      <div class="panel">
        <div class="panel-header">
          <h3>Reasoning Log</h3>
          <span id="token-estimate" class="token-badge"></span>
          <button id="copy-log" title="Copy log">Copy</button>
        </div>
        <div id="log-output" class="panel-body"></div>
      </div>

      <div class="panel-divider"></div>

      <!-- Right: Process & Output -->
      <div class="panel">
        <div class="panel-header">
          <h3>Process & Output</h3>
        </div>
        <div id="process-body" class="panel-body"></div>
      </div>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
